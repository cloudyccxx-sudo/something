<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Patch Tracker</title>
    <style>
        :root {
            --bg-color: #171a21;
            --card-color: #1b2838;
            --accent-color: #66c0f4;
            --text-color: #c7d5e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-color);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #0e141d;
            border: 1px solid #2a475e;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #47bfff, #1a7cc1);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        #result {
            margin-top: 25px;
        }
        .status-box {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .behind {
            background-color: #4c1c1c;
            border: 1px solid #8e2c2c;
            color: #ff9999;
        }
        .current {
            background-color: #233c19;
            border: 1px solid #437030;
            color: #bfff9e;
        }
        .patch-card {
            background-color: #121c27;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 4px 4px 0;
        }
        .patch-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        .patch-date {
            font-size: 0.8rem;
            color: #88929a;
            margin-bottom: 10px;
        }
        .patch-body {
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 200px;
            overflow-y: auto;
            background: #0b1118;
            padding: 10px;
            border-radius: 4px;
        }
        .loader {
            text-align: center;
            color: var(--accent-color);
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Steam Patch Tracker</h1>
    <div class="subtitle">Check how many updates your game build is behind</div>

    <div class="form-group">
        <label for="appId">Steam App ID:</label>
        <input type="number" id="appId" placeholder="e.g., 105600 for Terraria, 4000 for Garry's Mod" value="105600">
    </div>

    <div class="form-group">
        <label for="buildNum">Your Build Number / Patch Title / Keyword:</label>
        <input type="text" id="buildNum" placeholder="e.g., 1.4.4.9 or patch number snippet">
    </div>

    <button onclick="checkPatches()">Check Updates</button>

    <div id="loader" class="loader"><br>Fetching live data from Steam...</div>
    <div id="result"></div>
</div>

<script>
async function checkPatches() {
    const appId = document.getElementById('appId').value.trim();
    const buildNum = document.getElementById('buildNum').value.trim().toLowerCase();
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');

    if (!appId || !buildNum) {
        alert('Please fill out all the fields first.');
        return;
    }

    resultDiv.innerHTML = '';
    loader.style.display = 'block';

    // Requesting Steam News filtered for patch notes through a public proxy wrapper
    const steamApiUrl = `https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=30&tags=patchnotes`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(steamApiUrl)}`;

    try {
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error('Proxy error.');
        
        const wrapper = await response.json();
        const data = JSON.parse(wrapper.contents);
        const newsItems = data.appnews?.newsitems;
        
        if (!newsItems || newsItems.length === 0) {
            resultDiv.innerHTML = `<div class="status-box behind">No public patch notes discovered for this App ID. Double check the ID.</div>`;
            return;
        }

        let foundIndex = -1;

        // Loop backward/forward to match where your current build sits
        for (let i = 0; i < newsItems.length; i++) {
            const title = newsItems[i].title.toLowerCase();
            const contents = newsItems[i].contents.toLowerCase();
            
            if (title.includes(buildNum) || contents.includes(buildNum)) {
                foundIndex = i;
                break;
            }
        }

        if (foundIndex === -1) {
            resultDiv.innerHTML = `
                <div class="status-box behind">Could not pinpoint your version in the recent patch history.</div>
                <p style="text-align:center;">Tip: Try inputting a keyword snippet from your last known patch title description.</p>
            `;
            return;
        }

        if (foundIndex === 0) {
            resultDiv.innerHTML = `<div class="status-box current">✨ Perfect alignment! You are up to date with the latest build.</div>`;
            return;
        }

        // Generate patch cards for what was missed
        let htmlOutput = `<div class="status-box behind">⚠️ You are running ${foundIndex} patch${foundIndex > 1 ? 'es' : ''} behind!</div>`;
        htmlOutput += `<h3>Missed Changelogs:</h3>`;

        for (let i = 0; i < foundIndex; i++) {
            const item = newsItems[i];
            const date = new Date(item.date * 1000).toLocaleDateString();
            
            // Basic formatting adjustments to strip out rough Steam BBCode
            let cleanContents = item.contents
                .replace(/\[b\]/g, '<strong>').replace(/\[\/b\]/g, '</strong>')
                .replace(/\[list\]/g, '<ul>').replace(/\[\/list\]/g, '</ul>')
                .replace(/\[\*\]/g, '<li>')
                .replace(/\[\/?\w+.*?\]/g, ''); 

            htmlOutput += `
                <div class="patch-card">
                    <div class="patch-title">${item.title}</div>
                    <div class="patch-date">Deployed: ${date}</div>
                    <div class="patch-body">${cleanContents}</div>
                </div>
            `;
        }

        resultDiv.innerHTML = htmlOutput;

    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = `<div class="status-box behind">Error pulling data. Check your network connection.</div>`;
    } finally {
        loader.style.display = 'none';
    }
}
</script>

</body>
</html>
