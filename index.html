<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Patch History Viewer</title>
    <style>
        :root {
            --bg-color: #171a21;
            --card-color: #1b2838;
            --accent-color: #66c0f4;
            --text-color: #c7d5e0;
            --border-color: #2a475e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background-color: #0e141d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        input:focus { outline: none; border-color: var(--accent-color); }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #47bfff, #1a7cc1);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: linear-gradient(to right, #56c7ff, #228ad3); }
        .status-box {
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            text-align: left;
            font-weight: bold;
            background-color: #4c1c1c; 
            border: 1px solid #8e2c2c; 
            color: #ff9999;
        }
        .info-box { 
            background-color: #101c2c; 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
            font-size: 0.9rem; 
            font-weight: normal; 
            line-height: 1.5;
        }
        .patch-card {
            background-color: #121c27;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            margin-top: 15px;
            border-radius: 0 4px 4px 0;
        }
        .patch-title { font-weight: bold; color: #fff; margin-bottom: 5px; font-size: 1.1rem; }
        .patch-date { font-size: 0.8rem; color: #88929a; margin-bottom: 10px; }
        .patch-body {
            font-size: 0.95rem; white-space: pre-wrap; word-wrap: break-word;
            max-height: 250px; overflow-y: auto; background: #0b1118; padding: 12px; border-radius: 4px;
            line-height: 1.4;
        }
        .loader { 
            text-align: left; 
            color: var(--accent-color); 
            display: none; 
            margin-top: 15px; 
            font-family: monospace;
            background: #0e141d;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            white-space: pre-line;
        }
        h2.history-header { border-bottom: 1px solid var(--border-color); padding-bottom: 5px; color: #fff; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Steam Patch History</h1>
    <div class="subtitle">Enter any game name to view its update history wall</div>

    <input type="text" id="gameName" placeholder="e.g., Terraria or Elden Ring" autocomplete="off">
    <button onclick="fetchPatches()">View All Patches</button>

    <div id="loader" class="loader"></div>
    <div id="result"></div>
</div>

<script>
function logStatus(message, isError = false) {
    const loader = document.getElementById('loader');
    const color = isError ? '#ff9999' : '#66c0f4';
    loader.innerHTML += `<span style="color: ${color}">${message}</span>\n`;
}

// Custom Fetch with a strict 5-second cutoff threshold to prevent lingering freezes
async function fetchWithTimeout(url, timeout = 5000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    return response;
}

// Master Request router that cycles through 3 unique network wrappers
async function fetchFromProxies(targetUrl) {
    // Pipeline Option 1: CORSProxy.io
    try {
        logStatus(`⚡ Pipeline 1: Connecting via corsproxy.io...`);
        const res = await fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
        if (res.ok) {
            const data = await res.json();
            logStatus(`✅ Pipeline 1 Success.`);
            return data;
        }
        logStatus(`❌ Pipeline 1 status error: ${res.status}`);
    } catch (e) {
        logStatus(`❌ Pipeline 1 failed or timed out.`);
    }

    // Pipeline Option 2: CodeTabs Proxy
    try {
        logStatus(`⚡ Pipeline 2: Redirecting via codetabs.com...`);
        const res = await fetchWithTimeout(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
        if (res.ok) {
            const data = await res.json();
            logStatus(`✅ Pipeline 2 Success.`);
            return data;
        }
        logStatus(`❌ Pipeline 2 status error: ${res.status}`);
    } catch (e) {
        logStatus(`❌ Pipeline 2 failed or timed out.`);
    }

    // Pipeline Option 3: AllOrigins Wrapped Proxy Stringifier
    try {
        logStatus(`⚡ Pipeline 3: Querying via allorigins.win...`);
        const res = await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
        if (res.ok) {
            const wrapper = await res.json();
            const data = JSON.parse(wrapper.contents);
            logStatus(`✅ Pipeline 3 Success.`);
            return data;
        }
        logStatus(`❌ Pipeline 3 status error: ${res.status}`);
    } catch (e) {
        logStatus(`❌ Pipeline 3 failed or timed out.`);
    }

    throw new Error("All global data proxy pathways rejected the connection requests.");
}

async function fetchPatches() {
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const gameNameInput = document.getElementById('gameName').value.trim();
    
    if (!gameNameInput) {
        alert('Please enter a game name.');
        return;
    }

    resultDiv.innerHTML = '';
    loader.innerHTML = '';
    loader.style.display = 'block';
    
    logStatus(`🔍 Starting search operations for: "${gameNameInput}"`);

    try {
        const searchUrl = `https://steamcommunity.com/actions/SearchApps/${encodeURIComponent(gameNameInput)}`;
        const matches = await fetchFromProxies(searchUrl);

        if (!matches || matches.length === 0 || !Array.isArray(matches)) {
            resultDiv.innerHTML = `<div class="status-box">No explicit game titles matched "${gameNameInput}" inside the Steam directory database.</div>`;
            return;
        }

        const bestMatch = matches[0];
        const appId = bestMatch.id;
        document.getElementById('gameName').value = bestMatch.name; 
        
        logStatus(`🎯 Matched target title: "${bestMatch.name}" (ID: ${appId})`);
        logStatus(`📥 Fetching patch log histories...`);

        let newsData = null;
        try {
            newsData = await fetchFromProxies(`https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=30&tags=patchnotes`);
        } catch(e) {
            logStatus(`⚠️ Specific patch tags call rejected. Attempting broad feed request fallback...`);
        }

        let newsItems = newsData?.appnews?.newsitems;

        if (!newsItems || newsItems.length === 0) {
            newsData = await fetchFromProxies(`https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=30`);
            newsItems = newsData?.appnews?.newsitems;
        }

        if (!newsItems || newsItems.length === 0) {
            resultDiv.innerHTML = `
                <div class="status-box info-box">
                    <strong>Empty System Feed:</strong> "${bestMatch.name}" was successfully verified, but the game developers do not broadcast text announcements into Steam's community RSS hub structure.
                </div>
            `;
            return;
        }

        let htmlOutput = `<h2 class="history-header">Changelog Feed for ${bestMatch.name}</h2>`;
        
        newsItems.forEach(item => {
            const date = new Date(item.date * 1000).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            
            let cleanBody = item.contents
                .replace(/\[b\]/g, '<strong>').replace(/\[\/b\]/g, '</strong>')
                .replace(/\[h1\]/g, '<h3>').replace(/\[\/h1\]/g, '</h3>')
                .replace(/\[h2\]/g, '<h4>').replace(/\[\/h2\]/g, '</h4>')
                .replace(/\[list\]/g, '<ul>').replace(/\[\/list\]/g, '</ul>')
                .replace(/\[\*\]/g, '<li>')
                .replace(/\[img\].*?\[\/img\]/g, '') 
                .replace(/\[url=.*?\]/g, '').replace(/\[\/url\]/g, '')
                .replace(/\[\/?\w+.*?\]/g, ''); 

            htmlOutput += `
                <div class="patch-card">
                    <div class="patch-title">${item.title}</div>
                    <div class="patch-date">Posted on: ${date}</div>
                    <div class="patch-body">${cleanBody}</div>
                </div>
            `;
        });

        resultDiv.innerHTML = htmlOutput;
        loader.style.display = 'none'; // Clear system log block if compile finishes smoothly

    } catch (err) {
        logStatus(`🚨 CRITICAL EXCEPTION: ${err.message}`, true);
        resultDiv.innerHTML = `
            <div class="status-box">Network Handshake Refused</div>
            <div class="status-box info-box" style="margin-top:10px;">
                <strong>Why did this drop?</strong><br>
                Look closely at the live diagnostics log window above. If all three alternative pipelines throw a failure/timeout message, your browser configuration, router firewall, or ISP routing infrastructure is aggressively blocking third-party cross-origin resource sharing proxies.
            </div>
        `;
    }
}
</script>

</body>
</html>
