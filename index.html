<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Patch History Viewer ✧ Kawaii Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Kawaii Palette ✧ Purple Themed */
            --kawaii-main-bg: #f8f4ff; /* Pale soft purple */
            --kawaii-lavender: #d1b1f8; /* Soft pastel purple */
            --kawaii-violet: #9b51e0; /* Playful primary purple */
            --kawaii-border: #c4ace8; /* Light purple border */
            --kawaii-dark-text: #5f3e7e; /* Dark, soft purple-brown */
            --kawaii-pink: #ffadd2; /* Soft pink accent */
            --kawaii-success: #c48eff; /* Light success purple */
            --kawaii-danger: #e07070; /* Soft danger/error */
            --kawaii-overlay: #ffffff90; /* White overlay with alpha */
        }
        body {
            font-family: 'Patrick Hand', cursive;
            background-color: var(--kawaii-main-bg);
            background-image: linear-gradient(135deg, #f8f4ff 25%, #f2ebff 25%, #f2ebff 50%, #f8f4ff 50%, #f8f4ff 75%, #f2ebff 75%, #f2ebff 100%);
            background-size: 56.57px 56.57px;
            color: var(--kawaii-dark-text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--kawaii-overlay);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(182, 110, 239, 0.2);
            border: 4px solid var(--kawaii-border);
        }
        h1, h2, h3 {
            font-family: 'Pangolin', cursive;
            text-align: center;
            color: var(--kawaii-violet);
            margin-top: 0;
            text-shadow: 1px 1px 1px #fff, -1px -1px 1px #fff;
        }
        h1 { font-size: 2.2rem; }
        .subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: var(--kawaii-lavender);
            margin-bottom: 25px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 16px;
            box-sizing: border-box;
            background-color: #fff;
            border: 3px solid var(--kawaii-border);
            border-radius: 15px;
            color: var(--kawaii-dark-text);
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Patrick Hand', cursive;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--kawaii-violet);
            box-shadow: 0 0 10px var(--kawaii-lavender);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--kawaii-lavender), var(--kawaii-violet));
            border: 3px solid var(--kawaii-violet);
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Pangolin', cursive;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
            box-shadow: 0 4px 10px rgba(182, 110, 239, 0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button:hover {
            box-shadow: 0 6px 15px rgba(182, 110, 239, 0.3);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(1px);
        }
        .status-box {
            padding: 18px;
            border-radius: 15px;
            margin-top: 25px;
            text-align: left;
            font-weight: bold;
            background-color: rgba(224, 112, 112, 0.15); 
            border: 3px solid var(--kawaii-danger); 
            color: var(--kawaii-danger);
            font-family: 'Pangolin', cursive;
        }
        .info-box { 
            background-color: rgba(209, 177, 248, 0.2); 
            border: 3px solid var(--kawaii-lavender); 
            color: var(--kawaii-dark-text); 
            font-size: 1rem; 
            font-weight: normal; 
            line-height: 1.5;
            font-family: 'Patrick Hand', cursive;
        }
        .patch-card {
            background-color: rgba(255, 255, 255, 0.8);
            border-left: 6px solid var(--kawaii-violet);
            padding: 18px;
            margin-top: 20px;
            border-radius: 10px 20px 20px 10px;
            box-shadow: 0 4px 10px rgba(182, 110, 239, 0.1);
            transition: transform 0.2s;
        }
        .patch-card:hover {
            transform: scale(1.02);
            background-color: #fff;
        }
        .patch-title {
            font-family: 'Pangolin', cursive;
            font-weight: bold;
            color: var(--kawaii-violet);
            margin-bottom: 5px;
            font-size: 1.2rem;
        }
        .patch-date {
            font-size: 0.9rem;
            color: var(--kawaii-lavender);
            margin-bottom: 12px;
            font-weight: bold;
        }
        .patch-body {
            font-size: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(209, 177, 248, 0.1);
            padding: 14px;
            border-radius: 10px;
            line-height: 1.4;
            color: var(--kawaii-dark-text);
        }
        .loader { 
            text-align: left; 
            color: var(--kawaii-lavender); 
            display: none; 
            margin-top: 20px; 
            font-family: monospace;
            background: #2a1c4c;
            padding: 14px;
            border-radius: 10px;
            border: 3px solid var(--kawaii-violet);
            font-size: 0.9rem;
            white-space: pre-line;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        h2.history-header {
            border-bottom: 3px dashed var(--kawaii-lavender);
            padding-bottom: 10px;
            color: var(--kawaii-violet);
            margin-top: 30px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Steam Patch History</h1>
    <div class="subtitle">Enter any game name to view its update history wall</div>

    <input type="text" id="gameName" placeholder="e.g., Terraria or Elden Ring" autocomplete="off">
    <button onclick="fetchPatches()">View All Patches</button>

    <div id="loader" class="loader"></div>
    <div id="result"></div>
</div>

<script>
function logStatus(message, isError = false) {
    const loader = document.getElementById('loader');
    const color = isError ? '#ffadd2' : '#d1b1f8'; // Kawaii soft pink/lavender log colors
    loader.innerHTML += `<span style="color: ${color}">${message}</span>\n`;
}

async function fetchWithTimeout(url, timeout = 5000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    return response;
}

async function fetchFromProxies(targetUrl) {
    // Pipeline Option 1: CORSProxy.io
    try {
        logStatus(`⚡ Pipeline 1: Connecting via corsproxy.io...`);
        const res = await fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
        if (res.ok) {
            const data = await res.json();
            logStatus(`✅ Pipeline 1 Success.`);
            return data;
        }
        logStatus(`❌ Pipeline 1 status error: ${res.status}`);
    } catch (e) {
        logStatus(`❌ Pipeline 1 failed or timed out.`);
    }

    // Pipeline Option 2: CodeTabs Proxy
    try {
        logStatus(`⚡ Pipeline 2: Redirecting via codetabs.com...`);
        const res = await fetchWithTimeout(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
        if (res.ok) {
            const data = await res.json();
            logStatus(`✅ Pipeline 2 Success.`);
            return data;
        }
        logStatus(`❌ Pipeline 2 status error: ${res.status}`);
    } catch (e) {
        logStatus(`❌ Pipeline 2 failed or timed out.`);
    }

    // Pipeline Option 3: AllOrigins Wrapped Proxy Stringifier
    try {
        logStatus(`⚡ Pipeline 3: Querying via allorigins.win...`);
        const res = await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
        if (res.ok) {
            const wrapper = await res.json();
            const data = JSON.parse(wrapper.contents);
            logStatus(`✅ Pipeline 3 Success.`);
            return data;
        }
        logStatus(`❌ Pipeline 3 status error: ${res.status}`);
    } catch (e) {
        logStatus(`❌ Pipeline 3 failed or timed out.`);
    }

    throw new Error("All global data proxy pathways rejected the connection requests.");
}

async function fetchPatches() {
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const gameNameInput = document.getElementById('gameName').value.trim();
    
    if (!gameNameInput) {
        alert('Please enter a game name.');
        return;
    }

    resultDiv.innerHTML = '';
    loader.innerHTML = '';
    loader.style.display = 'block';
    
    logStatus(`🔍 Starting search operations for: "${gameNameInput}"`);

    try {
        const searchUrl = `https://steamcommunity.com/actions/SearchApps/${encodeURIComponent(gameNameInput)}`;
        const matches = await fetchFromProxies(searchUrl);

        if (!matches || matches.length === 0 || !Array.isArray(matches)) {
            resultDiv.innerHTML = `<div class="status-box info-box">No explicit game titles matched "${gameNameInput}" inside the Steam directory database.</div>`;
            return;
        }

        const bestMatch = matches[0];
        
        // FIX: Extract "appid" or fallback to "id" to guarantee variable validation
        const appId = bestMatch.appid || bestMatch.id; 
        
        if (!appId) {
            throw new Error("The target matching entry was structural but lacked a valid App ID mapping key.");
        }

        document.getElementById('gameName').value = bestMatch.name; 
        
        logStatus(`🎯 Matched target title: "${bestMatch.name}" (ID: ${appId})`);
        logStatus(`📥 Fetching patch log histories...`);

        let newsData = null;
        try {
            newsData = await fetchFromProxies(`https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=30&tags=patchnotes`);
        } catch(e) {
            logStatus(`⚠️ Specific patch tags call rejected. Attempting broad feed request fallback...`);
        }

        let newsItems = newsData?.appnews?.newsitems;

        if (!newsItems || newsItems.length === 0) {
            newsData = await fetchFromProxies(`https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=30`);
            newsItems = newsData?.appnews?.newsitems;
        }

        if (!newsItems || newsItems.length === 0) {
            resultDiv.innerHTML = `
                <div class="status-box info-box">
                    <strong>Empty System Feed:</strong> "${bestMatch.name}" was successfully verified, but the game developers do not broadcast text announcements into Steam's community RSS hub structure.
                </div>
            `;
            return;
        }

        let htmlOutput = `<h2 class="history-header">Changelog Feed for ${bestMatch.name}</h2>`;
        
        newsItems.forEach(item => {
            const date = new Date(item.date * 1000).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            
            let cleanBody = item.contents
                .replace(/\[b\]/g, '<strong>').replace(/\[\/b\]/g, '</strong>')
                .replace(/\[h1\]/g, '<h3>').replace(/\[\/h1\]/g, '</h3>')
                .replace(/\[h2\]/g, '<h4>').replace(/\[\/h2\]/g, '</h4>')
                .replace(/\[list\]/g, '<ul>').replace(/\[\/list\]/g, '</ul>')
                .replace(/\[\*\]/g, '<li>')
                .replace(/\[img\].*?\[\/img\]/g, '') 
                .replace(/\[url=.*?\]/g, '').replace(/\[\/url\]/g, '')
                .replace(/\[\/?\w+.*?\]/g, ''); 

            htmlOutput += `
                <div class="patch-card">
                    <div class="patch-title">${item.title}</div>
                    <div class="patch-date">Posted on: ${date}</div>
                    <div class="patch-body">${cleanBody}</div>
                </div>
            `;
        });

        resultDiv.innerHTML = htmlOutput;
        loader.style.display = 'none'; 

    } catch (err) {
        logStatus(`🚨 CRITICAL EXCEPTION: ${err.message}`, true);
        resultDiv.innerHTML = `
            <div class="status-box info-box" style="margin-top:10px;">
                <strong>Why did this drop?</strong><br>
                Look closely at the live diagnostics log window above. The properties are parsing correctly now, but if the servers return a 403 or 400 error code, it means Steam is actively rejecting the automated third-party request structure from that proxy.
            </div>
        `;
    }
}
</script>

</body>
</html>
