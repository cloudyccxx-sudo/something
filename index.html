<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Patch Log</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
            --accent-red: #ff3e3e;
            --border-color: #444;
            --panel-bg: rgba(15, 15, 15, 0.85);
            --danger-bg: rgba(60, 0, 0, 0.7);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: url('1000008139.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-color);
        }

        /* Darkening overlay to make text readable */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--panel-bg);
            padding: 30px;
            border: 2px solid var(--accent-red);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.3);
        }

        h1, h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-red);
            text-align: center;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid var(--border-color);
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-red);
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent-red);
            color: white;
        }

        .patch-card {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .patch-title {
            color: var(--accent-red);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .patch-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }

        .patch-body {
            font-size: 0.95rem;
            line-height: 1.4;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .loader {
            margin-top: 20px;
            font-family: monospace;
            background: #000;
            padding: 10px;
            border: 1px solid var(--border-color);
            display: none;
            font-size: 0.85rem;
            white-space: pre-line;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Database Query</h1>
    <input type="text" id="gameName" placeholder="Enter target application ID or name..." autocomplete="off">
    <button onclick="fetchPatches()">Retrieve Logs</button>

    <div id="loader" class="loader"></div>
    <div id="result"></div>
</div>

<script>
async function fetchWithTimeout(url, timeout = 5000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    const response = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    return response;
}

function logStatus(msg) {
    const loader = document.getElementById('loader');
    loader.style.display = 'block';
    loader.innerHTML += `> ${msg}\n`;
}

async function fetchFromProxies(targetUrl) {
    const proxies = [
        `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
        `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`
    ];

    for (const url of proxies) {
        try {
            logStatus(`Connecting to node...`);
            const res = await fetchWithTimeout(url);
            if (res.ok) {
                if (url.includes('allorigins')) {
                    const wrapper = await res.json();
                    return JSON.parse(wrapper.contents);
                }
                return await res.json();
            }
        } catch (e) {
            continue;
        }
    }
    throw new Error("All data nodes failed.");
}

async function fetchPatches() {
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const gameName = document.getElementById('gameName').value.trim();
    
    if (!gameName) return;

    resultDiv.innerHTML = '';
    loader.innerHTML = '';
    
    try {
        logStatus(`Searching for: ${gameName}`);
        const matches = await fetchFromProxies(`https://steamcommunity.com/actions/SearchApps/${encodeURIComponent(gameName)}`);
        
        if (!matches || matches.length === 0) {
            resultDiv.innerHTML = `<div class="patch-card">Target not found in directory.</div>`;
            return;
        }

        const appId = matches[0].appid || matches[0].id;
        logStatus(`Target locked. ID: ${appId}`);
        
        const newsData = await fetchFromProxies(`https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=10`);
        const items = newsData?.appnews?.newsitems || [];

        if (items.length === 0) {
            resultDiv.innerHTML = `<div class="patch-card">No logs retrieved.</div>`;
            return;
        }

        items.forEach(item => {
            const date = new Date(item.date * 1000).toLocaleDateString();
            const buildNum = item.gid ? item.gid.toString().substring(4, 11) : "N/A";
            
            let content = item.contents
                .replace(/\[.*?\]/g, '')
                .replace(/\n/g, '<br>');

            resultDiv.innerHTML += `
                <div class="patch-card">
                    <div class="patch-title">${item.title}</div>
                    <div class="patch-meta">Date: ${date} | Build: ${buildNum}</div>
                    <div class="patch-body">${content}</div>
                </div>
            `;
        });
        loader.style.display = 'none';

    } catch (err) {
        logStatus(`CRITICAL_FAILURE: ${err.message}`);
    }
}
</script>

</body>
</html>
