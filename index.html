<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Patch History Viewer</title>
    <style>
        :root {
            --bg-color: #171a21;
            --card-color: #1b2838;
            --accent-color: #66c0f4;
            --text-color: #c7d5e0;
            --border-color: #2a475e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--card-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background-color: #0e141d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #47bfff, #1a7cc1);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: linear-gradient(to right, #56c7ff, #228ad3);
        }
        .status-box {
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            background-color: #4c1c1c; 
            border: 1px solid #8e2c2c; 
            color: #ff9999;
        }
        .info-box { 
            background-color: #101c2c; 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
            text-align: left; 
            font-size: 0.9rem; 
            font-weight: normal; 
            line-height: 1.5;
        }
        .patch-card {
            background-color: #121c27;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            margin-top: 15px;
            border-radius: 0 4px 4px 0;
        }
        .patch-title { font-weight: bold; color: #fff; margin-bottom: 5px; font-size: 1.1rem; }
        .patch-date { font-size: 0.8rem; color: #88929a; margin-bottom: 10px; }
        .patch-body {
            font-size: 0.95rem; white-space: pre-wrap; word-wrap: break-word;
            max-height: 250px; overflow-y: auto; background: #0b1118; padding: 12px; border-radius: 4px;
            line-height: 1.4;
        }
        .loader { text-align: center; color: var(--accent-color); display: none; margin-top: 15px; font-weight: bold; }
        h2.history-header { border-bottom: 1px solid var(--border-color); padding-bottom: 5px; color: #fff; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Steam Patch History</h1>
    <div class="subtitle">Enter any game name to view its update history wall</div>

    <div class="form-group">
        <input type="text" id="gameName" placeholder="e.g., Terraria or Elden Ring" autocomplete="off">
    </div>

    <button onclick="fetchPatches()">View All Patches</button>

    <div id="loader" class="loader">Searching Steam directory...</div>
    <div id="result"></div>
</div>

<script>
// Logic Failover Handler: Tries primary proxy network, switches to secondary if blocked
async function requestCORS(url) {
    // Pipeline 1: CORSProxy.io (High-speed direct proxy)
    try {
        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
        if (res.ok) return await res.json();
    } catch (e) {
        console.warn("Primary CORS proxy offline or blocked. Engaging secondary backup layer...");
    }

    // Pipeline 2: AllOrigins (String-wrapped structural backup)
    try {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
        if (res.ok) {
            const wrapper = await res.json();
            return JSON.parse(wrapper.contents);
        }
    } catch (e) {
        console.error("Secondary backup pipeline failed.");
    }

    throw new Error("All public data transmission pathways are currently blocked by your local network layout.");
}

async function fetchPatches() {
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const gameNameInput = document.getElementById('gameName').value.trim();
    
    if (!gameNameInput) {
        alert('Please enter a game name.');
        return;
    }

    resultDiv.innerHTML = '';
    loader.style.display = 'block';
    loader.innerText = `Searching for "${gameNameInput}"...`;

    try {
        // Step 1: Query Steam database search through the failover proxy handler
        const searchUrl = `https://steamcommunity.com/actions/SearchApps/${encodeURIComponent(gameNameInput)}`;
        const matches = await requestCORS(searchUrl);

        if (!matches || matches.length === 0) {
            resultDiv.innerHTML = `<div class="status-box">No games matched "${gameNameInput}". Check your spelling and try again.</div>`;
            return;
        }

        const bestMatch = matches[0];
        const appId = bestMatch.id;
        document.getElementById('gameName').value = bestMatch.name; 

        loader.innerText = `Found "${bestMatch.name}". Downloading changelogs...`;

        // Step 2: Extract historical patch notes logs
        let newsData;
        try {
            newsData = await requestCORS(`https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=40&tags=patchnotes`);
        } catch (e) {
            // Safe fallback if the specific tag endpoint rejects the call
            newsData = null;
        }
        
        let newsItems = newsData?.appnews?.newsitems;

        if (!newsItems || newsItems.length === 0) {
            newsData = await requestCORS(`https://api.steampowered.com/ISteamNews/GetNewsForApp/v2/?appid=${appId}&count=40`);
            newsItems = newsData?.appnews?.newsitems;
        }

        if (!newsItems || newsItems.length === 0) {
            resultDiv.innerHTML = `
                <div class="status-box info-box">
                    <strong>Empty Feed:</strong> "${bestMatch.name}" was found, but the developers do not post their text changelogs directly to Steam's built-in community news network.
                </div>
            `;
            return;
        }

        // Step 3: Parse BBCode layout markers and build display grid
        let htmlOutput = `<h2 class="history-header">Changelog Feed for ${bestMatch.name}</h2>`;
        
        newsItems.forEach(item => {
            const date = new Date(item.date * 1000).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            
            let cleanBody = item.contents
                .replace(/\[b\]/g, '<strong>').replace(/\[\/b\]/g, '</strong>')
                .replace(/\[h1\]/g, '<h3>').replace(/\[\/h1\]/g, '</h3>')
                .replace(/\[h2\]/g, '<h4>').replace(/\[\/h2\]/g, '</h4>')
                .replace(/\[list\]/g, '<ul>').replace(/\[\/list\]/g, '</ul>')
                .replace(/\[\*\]/g, '<li>')
                .replace(/\[img\].*?\[\/img\]/g, '') 
                .replace(/\[url=.*?\]/g, '').replace(/\[\/url\]/g, '')
                .replace(/\[\/?\w+.*?\]/g, ''); 

            htmlOutput += `
                <div class="patch-card">
                    <div class="patch-title">${item.title}</div>
                    <div class="patch-date">Posted on: ${date}</div>
                    <div class="patch-body">${cleanBody}</div>
                </div>
            `;
        });

        resultDiv.innerHTML = htmlOutput;

    } catch (err) {
        console.error(err);
        resultDiv.innerHTML = `
            <div class="status-box">Network Access Terminated</div>
            <div class="status-box info-box" style="margin-top:10px;">
                <strong>🚨 Why is this happening?</strong><br>
                Both global data proxies (`corsproxy.io` and `allorigins.win`) are failing to handle the request. This means your local web browser router configurations or ISP firewalls are actively dropping requests to open cross-origin proxies. 
            </div>
        `;
    } finally {
        loader.style.display = 'none';
    }
}
</script>

</body>
</html>
